name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & Package
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libvte-2.91-gtk4-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Build release binaries
        run: cargo build --release

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build .deb package
        run: cargo deb --no-build

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create release archive
        run: |
          ARCHIVE_DIR="tuxflow-${{ steps.version.outputs.version }}-x86_64-linux"
          mkdir -p "$ARCHIVE_DIR"
          cp target/release/tuxflow "$ARCHIVE_DIR/"
          cp target/release/tuxflow-mcp "$ARCHIVE_DIR/"
          cp data/com.tuxflow.TuxFlow.desktop "$ARCHIVE_DIR/"
          cp data/com.tuxflow.TuxFlow.metainfo.xml "$ARCHIVE_DIR/"
          cp data/icons/com.tuxflow.TuxFlow.svg "$ARCHIVE_DIR/"
          cp LICENSE-MIT "$ARCHIVE_DIR/"
          cp README.md "$ARCHIVE_DIR/"
          cp scripts/install.sh "$ARCHIVE_DIR/"
          tar czf "${ARCHIVE_DIR}.tar.gz" "$ARCHIVE_DIR"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            tuxflow-${{ steps.version.outputs.version }}-x86_64-linux.tar.gz
            target/debian/tuxflow_${{ steps.version.outputs.version }}-1_amd64.deb
