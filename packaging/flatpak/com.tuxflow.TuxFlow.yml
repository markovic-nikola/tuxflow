app-id: com.tuxflow.TuxFlow
runtime: org.gnome.Platform
runtime-version: '46'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: tuxflow

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --talk-name=org.freedesktop.Notifications
  - --filesystem=home

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/tuxflow/cargo
    RUST_BACKTRACE: '1'

modules:
  - name: vte
    buildsystem: meson
    sources:
      - type: archive
        url: https://download.gnome.org/sources/vte/0.76/vte-0.76.0.tar.xz
        sha256: # fill in from GNOME sources

  - name: tuxflow
    buildsystem: simple
    build-commands:
      - cargo build --release
      - install -Dm755 target/release/tuxflow /app/bin/tuxflow
      - install -Dm644 data/com.tuxflow.TuxFlow.desktop /app/share/applications/com.tuxflow.TuxFlow.desktop
      - install -Dm644 data/com.tuxflow.TuxFlow.metainfo.xml /app/share/metainfo/com.tuxflow.TuxFlow.metainfo.xml
      - install -Dm644 data/icons/com.tuxflow.TuxFlow.svg /app/share/icons/hicolor/scalable/apps/com.tuxflow.TuxFlow.svg
    sources:
      - type: dir
        path: ../../
