name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & Package
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev libvte-2.91-gtk4-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-release-

      - name: Build release binaries
        run: cargo build --release

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Build .deb package
        run: cargo deb --no-build

      - name: Build AppImage
        run: |
          sudo apt-get install -y python3-pip python3-setuptools patchelf desktop-file-utils libgdk-pixbuf2.0-dev
          sudo pip3 install --break-system-packages appimage-builder
          sudo apt-key adv --keyserver keyserver.ubuntu.com --recv-keys 871920D1991BC93C
          mkdir -p packaging/appimage/AppDir/usr/bin
          cp target/release/tuxflow packaging/appimage/AppDir/usr/bin/
          cp target/release/tuxflow-mcp packaging/appimage/AppDir/usr/bin/
          mkdir -p packaging/appimage/AppDir/usr/share/applications
          cp data/com.tuxflow.TuxFlow.desktop packaging/appimage/AppDir/usr/share/applications/
          mkdir -p packaging/appimage/AppDir/usr/share/icons/hicolor/scalable/apps
          cp data/icons/hicolor/scalable/apps/com.tuxflow.TuxFlow.svg packaging/appimage/AppDir/usr/share/icons/hicolor/scalable/apps/
          cp data/icons/hicolor/scalable/apps/tuxflow-logo-symbolic.svg packaging/appimage/AppDir/usr/share/icons/hicolor/scalable/apps/
          mkdir -p packaging/appimage/AppDir/usr/share/icons/hicolor/scalable/actions
          cp data/icons/hicolor/scalable/actions/ai-brain-symbolic.svg packaging/appimage/AppDir/usr/share/icons/hicolor/scalable/actions/
          cd packaging/appimage
          appimage-builder --skip-script --skip-tests
          mv *.AppImage ../../

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create release archive
        run: |
          ARCHIVE_DIR="tuxflow-${{ steps.version.outputs.version }}-x86_64-linux"
          mkdir -p "$ARCHIVE_DIR"
          cp target/release/tuxflow "$ARCHIVE_DIR/"
          cp target/release/tuxflow-mcp "$ARCHIVE_DIR/"
          cp data/com.tuxflow.TuxFlow.desktop "$ARCHIVE_DIR/"
          cp data/com.tuxflow.TuxFlow.metainfo.xml "$ARCHIVE_DIR/"
          cp data/icons/hicolor/scalable/apps/com.tuxflow.TuxFlow.svg "$ARCHIVE_DIR/"
          cp LICENSE-MIT "$ARCHIVE_DIR/"
          cp README.md "$ARCHIVE_DIR/"
          cp scripts/install.sh "$ARCHIVE_DIR/"
          tar czf "${ARCHIVE_DIR}.tar.gz" "$ARCHIVE_DIR"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            tuxflow-${{ steps.version.outputs.version }}-x86_64-linux.tar.gz
            target/debian/*.deb
            *.AppImage
