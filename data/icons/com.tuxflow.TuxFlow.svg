<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#73c991"/>
      <stop offset="100%" stop-color="#4ecdc4"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="4" y="4" width="120" height="120" rx="24" fill="url(#bg)"/>
  <!-- Terminal prompt arrow -->
  <path d="M 30 48 L 54 64 L 30 80" stroke="url(#accent)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Flow lines -->
  <line x1="62" y1="64" x2="98" y2="64" stroke="url(#accent)" stroke-width="7" stroke-linecap="round"/>
  <circle cx="98" cy="48" r="5" fill="#73c991" opacity="0.7"/>
  <circle cx="98" cy="64" r="5" fill="#73c991"/>
  <circle cx="98" cy="80" r="5" fill="#73c991" opacity="0.7"/>
  <line x1="98" y1="48" x2="98" y2="80" stroke="#73c991" stroke-width="3" opacity="0.4"/>
</svg>
